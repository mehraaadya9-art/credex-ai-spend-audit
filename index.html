<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spend Audit</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 80px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
    }

    .container {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      width: 250px;
      border-radius: 12px;
    }

    button {
      margin-top: 30px;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>

</head>

<body>

  <header>
    <h1>AI Spend Audit Web App 🚀</h1>
    <p>Track your expenses and get AI-powered financial insights</p>

    <button>Get Started</button>
  </header>

  <div class="container">
    <div class="card">
      <h3>Smart Tracking</h3>
      <p>Automatically track your spending habits</p>
    </div>

    <div class="card">
      <h3>AI Insights</h3>
      <p>Understand where your money goes</p>
    </div>

    <div class="card">
      <h3>Save Money</h3>
      <p>Get suggestions to reduce expenses</p>
    </div>
  </div>

</body>
</html>
